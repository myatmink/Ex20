<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <title>Table and Fixed Div</title>

      <style>
          body {
                  font-family: Arial, sans-serif;
                        background-color: #f2f2f2;
                              padding: 40px;
          }

              /* Table styling */
                  table {
                          border-collapse: collapse;
                                width: 300px;
                  }

                      th, td {
                              border: 2px solid black;
                                    text-align: center;
                                          padding: 15px;
                                                font-size: 18px;
                      }

                          th {
                                  background-color: #888;
                                        color: white;
                          }

                              /* Alternating row colors */
                                  tr:nth-child(2),
                                      tr:nth-child(4) {
                                              background-color: yellow;
                                      }

                                          tr:nth-child(3) {
                                                  background-color: #ddd;
                                          }

                                              /* Fixed div */
                                                  .fixed-box {
                                                          position: fixed;
                                                                top: 50px;
                                                                      right: 50px;
                                                                            width: 200px;
                                                                                  padding: 20px;
                                                                                        border: 4px solid green;
                                                                                              background-color: white;
                                                                                                    font-size: 18px;
                                                  }
                                                    </style>
                                                    </head>

                                                    <body>

                                                      <!-- Table -->
                                                        <table>
                                                            <tr>
                                                                  <th>Firstname</th>
                                                                        <th>Lastname</th>
                                                                            </tr>
                                                                                <tr>
                                                                                      <td>1</td>
                                                                                            <td>1</td>
                                                                                                </tr>
                                                                                                    <tr>
                                                                                                          <td>2</td>
                                                                                                                <td>2</td>
                                                                                                                    </tr>
                                                                                                                        <tr>
                                                                                                                              <td>3</td>
                                                                                                                                    <td>3</td>
                                                                                                                                        </tr>
                                                                                                                                          </table>

                                                                                                                                            <!-- Fixed div -->
                                                                                                                                              <div class="fixed-box">
                                                                                                                                                  This div element has<br>
                                                                                                                                                      position: fixed;
                                                                                                                                                        </div>

                                                                                                                                                        </body>
                                                                                                                                                        </html>
